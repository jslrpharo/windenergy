<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#16304a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="57%" r="22%">
      <stop offset="0%" stop-color="#5aaae0" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="50%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#3a7fbf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#floorGlow)"/>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- ============================================================
       LEFT PERSON — our representative (back / 3/4 view)
       Body centre at x=200
       ============================================================ -->

  <!-- Suit body — back view: wide shoulders tapering down, cut at bottom of image -->
  <path d="M68,178 C100,156 150,158 200,160 C250,158 300,156 332,178 L338,500 L62,500 Z"
        fill="#0d2036"/>
  <!-- Jacket centre-back seam (subtle) -->
  <line x1="200" y1="163" x2="200" y2="360"
        stroke="#071525" stroke-width="2.5" opacity="0.55"/>
  <!-- Left shoulder / lapel edge (barely visible side) -->
  <path d="M68,178 C82,168 95,162 200,160" stroke="#071525" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Neck (back view) -->
  <rect x="185" y="135" width="30" height="30" rx="5" fill="#0d2036"/>

  <!-- White shirt collar — just the band visible above jacket at back of neck -->
  <path d="M185,141 Q200,136 215,141"
        stroke="rgba(255,255,255,0.72)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Head — back view, very slightly tilted toward centre -->
  <ellipse cx="200" cy="90" rx="43" ry="49"
           fill="#0d2036" transform="rotate(3 200 90)"/>
  <!-- Short hair texture at crown (dark cap) -->
  <ellipse cx="200" cy="60" rx="43" ry="19"
           fill="#071525" transform="rotate(3 200 60)"/>
  <!-- Slight ear silhouette right side (facing centre) -->
  <ellipse cx="241" cy="97" rx="9" ry="13"
           fill="#0a1c2f" transform="rotate(-10 241 97)"/>

  <!-- RIGHT ARM extending forward to handshake (target ≈ 400, 278) -->
  <!-- Outer dark edge -->
  <path d="M314,213 C338,226 360,248 384,270"
        stroke="#071525" stroke-width="50" fill="none" stroke-linecap="round"/>
  <!-- Sleeve fill -->
  <path d="M314,213 C338,226 360,248 384,270"
        stroke="#0d2036" stroke-width="43" fill="none" stroke-linecap="round"/>
  <!-- White cuff stripe -->
  <path d="M377,265 C383,271 388,276"
        stroke="rgba(255,255,255,0.78)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Hand / wrist reaching right -->
  <ellipse cx="400" cy="281" rx="21" ry="12"
           fill="#132a1c" transform="rotate(-28 400 281)"/>
  <!-- Thumb hint -->
  <path d="M392,274 C397,270 404,271"
        stroke="#0a1f14" stroke-width="6" fill="none" stroke-linecap="round"/>


  <!-- ============================================================
       RIGHT PERSON — the client (full front view, smiling)
       Body centre at x=600
       ============================================================ -->

  <!-- Suit body — front view -->
  <path d="M468,175 C502,154 552,157 600,159 C648,157 698,154 732,175 L738,500 L462,500 Z"
        fill="#1b3652"/>

  <!-- Left lapel -->
  <path d="M584,145 L562,182 L505,170 L484,180 L468,175"
        fill="#0d2135" opacity="0.75"/>
  <!-- Right lapel -->
  <path d="M616,145 L638,182 L695,170 L716,180 L732,175"
        fill="#0d2135" opacity="0.75"/>

  <!-- Shirt (white V between lapels) -->
  <path d="M584,145 L600,172 L616,145"
        fill="rgba(255,255,255,0.88)"/>

  <!-- Tie — burgundy -->
  <polygon points="595,155 600,162 605,155 602.5,198 600,204 597.5,198"
           fill="#7a1515"/>

  <!-- Neck -->
  <rect x="583" y="137" width="34" height="30" rx="5" fill="#1b3652"/>

  <!-- Head -->
  <ellipse cx="600" cy="88" rx="48" ry="54" fill="#1b3652"/>

  <!-- Hair (short, dark) -->
  <path d="M552,74 C554,40 575,30 600,29 C625,30 646,40 648,74
           C638,50 618,54 600,56 C582,54 562,50 552,74 Z"
        fill="#0e2033"/>

  <!-- Brow ridge (subtle depth) -->
  <path d="M575,68 Q600,63 625,68"
        stroke="#0e2033" stroke-width="4" fill="none" opacity="0.55"/>

  <!-- Eyes — closed/squinting in a smile -->
  <path d="M581,79 Q589,74 597,79"
        stroke="#0d1f35" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M603,79 Q611,74 619,79"
        stroke="#0d1f35" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Smile — warm, wide grin -->
  <path d="M578,106 Q600,123 622,106"
        stroke="#0d1f35" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Teeth (white hint) -->
  <path d="M582,108 Q600,120 618,108"
        stroke="rgba(255,255,255,0.45)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Cheek roundness (slight fill for smile) -->
  <ellipse cx="576" cy="104" rx="9" ry="7" fill="#1e3d5a" opacity="0.6"/>
  <ellipse cx="624" cy="104" rx="9" ry="7" fill="#1e3d5a" opacity="0.6"/>

  <!-- LEFT ARM extending toward handshake (target ≈ 400, 278) -->
  <!-- Outer dark edge -->
  <path d="M484,215 C460,228 438,250 415,272"
        stroke="#0d2135" stroke-width="50" fill="none" stroke-linecap="round"/>
  <!-- Sleeve fill -->
  <path d="M484,215 C460,228 438,250 415,272"
        stroke="#1b3652" stroke-width="43" fill="none" stroke-linecap="round"/>
  <!-- White cuff stripe -->
  <path d="M421,268 C415,274 410,279"
        stroke="rgba(255,255,255,0.78)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Hand reaching left -->
  <ellipse cx="400" cy="281" rx="21" ry="12"
           fill="#2a4a38" transform="rotate(28 400 281)"/>
  <!-- Thumb hint -->
  <path d="M408,274 C403,270 396,271"
        stroke="#1c3428" stroke-width="6" fill="none" stroke-linecap="round"/>


  <!-- ============================================================
       HANDSHAKE GLOW — focal highlight at the meeting point
       ============================================================ -->
  <ellipse cx="400" cy="280" rx="70" ry="42" fill="#5aaae0" opacity="0.10"/>
  <ellipse cx="400" cy="280" rx="38" ry="22" fill="#7bc8f0" opacity="0.14"/>
  <ellipse cx="400" cy="280" rx="16" ry="9"  fill="#aae0ff" opacity="0.18"/>

</svg>
